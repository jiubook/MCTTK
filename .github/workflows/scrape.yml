name: Minecraft News Scraper

on:
  schedule:
    # 每6小时运行一次 (UTC 时间: 0,6,12,18 点)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅检测新新闻，不实际处理'
        required: false
        default: 'false'
        type: boolean
      scrape_only:
        description: '只爬取翻译，不发布到 MCBBS'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: MCTTK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MCBBS_USERNAME: ${{ secrets.MCBBS_USERNAME }}
          MCBBS_PASSWORD: ${{ secrets.MCBBS_PASSWORD }}
          MCBBS_CAPTCHA_ANSWER: ${{ secrets.MCBBS_CAPTCHA_ANSWER }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          elif [ "${{ inputs.scrape_only }}" = "true" ]; then
            python main.py --scrape-only
          else
            python main.py
          fi

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-news-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: ignore

      - name: Commit state files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/.state.json output/.posted.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update state files [skip ci]"
          git push
